<!DOCTYPE html>

        <title>Rock Paper Scissors</title>
        <meta charset="utf-8">
        <link rel="stylsheet" href="styles.css">

    <body>

        <button id="paper">Paper</button>

        <script src="javascript.js"></script>
    </body>
